version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - adpilot_network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - adpilot_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - adpilot_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - clickhouse
      - redis
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    networks:
      - adpilot_network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.core.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres
      - clickhouse
    env_file:
      - .env
    networks:
      - adpilot_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.core.celery_app beat --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
    networks:
      - adpilot_network
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.bot.main
    depends_on:
      - api
      - redis
    env_file:
      - .env
    networks:
      - adpilot_network
    restart: unless-stopped

networks:
  adpilot_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
